<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riffle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <div class="top-nav">

        <div class="profile">
            <div class="profile-circle">R</div>

        </div>
    </div>

    <div class="side-bar">
        <a href="riffle.html"><img src="images/R.png" alt="logo" class="logo"></a>

        <i class="fa-regular fa-bell"></i>
        <i class="fa-regular fa-comment"></i>
        <i class="fa-solid fa-gear"></i>

    <div class="main-container">

        <div class="card card-l"><img src="images/grid/image 11.jpg" alt=""></div>
        <div class="card card-l"><img src="images/grid/image 12.jpg" alt=""></div>
        <div class="card card-l"><img src="images/grid/image 13.jpg" alt=""></div>
        <div class="card card-l"><img src="images/grid/image 14.jpg" alt=""></div>
        <div class="card card-s"><img src="images/grid/image 15.jpg" alt=""></div>
        <div class="card card-s"><img src="images/grid/image 16.jpg" alt=""></div>
